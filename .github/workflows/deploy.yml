name: Deploy Laravel to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NPM Packages
        run: npm install

      - name: Build Vite
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: htdocs/
          # Nama state baru = mulai sinkron dari nol supaya semua folder
          # dibuat ulang (memperbaiki error 553 "No such file or directory").
          # Tidak menghapus vendor/ & .env di server karena keduanya di-exclude.
          state-name: .ftp-deploy-state-v2.json
          log-level: verbose
          timeout: 60000
          exclude: |
            **/.git/**
            **/.git*
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/resources/js/**
            **/resources/css/**
            **/.vscode/**
            **/.env
            **/.env.*
            **/.editorconfig
            **/.gitattributes
            **/.gitignore
            **/render.yaml
            **/phpunit.xml
            **/vite.config.js
            **/package.json
            **/package-lock.json
            **/README.md